server:
  port: 8080

spring:
  application:
    name: ai-relay-gateway
  main:
    web-application-type: reactive

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 8

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

logging:
  level:
    com.nexora: DEBUG
    reactor.netty: INFO
    org.springframework.data.redis: INFO
